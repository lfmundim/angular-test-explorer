name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docs-and-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          set -euo pipefail
          test -f README.md
          test -f CONTRIBUTING.md
          test -f AGENTS.md
          test -f .gitignore

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            README.md
            CONTRIBUTING.md
            AGENTS.md
            .github/ISSUE_TEMPLATE/*.md

  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --accept 200,206,429
            --max-concurrency 8
            README.md CONTRIBUTING.md AGENTS.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
