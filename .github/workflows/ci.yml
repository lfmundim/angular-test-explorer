name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      release_channel:
        description: Publish channel for VS Code Marketplace
        required: true
        default: prerelease
        type: choice
        options:
          - prerelease
          - stable

jobs:
  extension-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: npm ci

      - name: Install Nerdbank.GitVersioning tool
        run: dotnet tool install --global nbgv

      - name: Sync package version from version.json
        run: |
          set -euo pipefail
          VERSION="$(nbgv get-version -v NuGetPackageVersion)"
          echo "Resolved version: ${VERSION}"
          export VERSION
          node -e 'const fs=require("fs"); const p="package.json"; const j=JSON.parse(fs.readFileSync(p,"utf8")); j.version=process.env.VERSION; fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");'

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npx @vscode/vsce package --pre-release

  docs-and-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify required files
        run: |
          set -euo pipefail
          test -f README.md
          test -f CONTRIBUTING.md
          test -f AGENTS.md
          test -f .gitignore

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            README.md
            CONTRIBUTING.md
            AGENTS.md
            .github/ISSUE_TEMPLATE/*.md

  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          failIfEmpty: false
          args: >-
            --no-progress
            --accept 200,206,429
            --max-concurrency 8
            README.md CONTRIBUTING.md AGENTS.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-marketplace:
    runs-on: ubuntu-latest
    needs: extension-quality
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: npm ci

      - name: Install Nerdbank.GitVersioning tool
        run: dotnet tool install --global nbgv

      - name: Sync package version from version.json
        run: |
          set -euo pipefail
          VERSION="$(nbgv get-version -v NuGetPackageVersion)"
          echo "Resolved version: ${VERSION}"
          export VERSION
          node -e 'const fs=require("fs"); const p="package.json"; const j=JSON.parse(fs.readFileSync(p,"utf8")); j.version=process.env.VERSION; fs.writeFileSync(p, JSON.stringify(j, null, 2) + "\n");'

      - name: Build extension output
        run: npm run build

      - name: Publish prerelease to VS Code Marketplace
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_channel == 'prerelease')
        run: npx @vscode/vsce publish --pre-release
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish stable to VS Code Marketplace
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_channel == 'stable'
        run: npx @vscode/vsce publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
